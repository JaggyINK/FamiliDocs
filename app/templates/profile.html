{% extends "base.html" %}

{% block title %}Mon Profil - FamiliDocs{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person me-2"></i>Mon Profil
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('user.profile') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Prenom <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                   value="{{ current_user.first_name }}" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Nom <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                   value="{{ current_user.last_name }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ current_user.email }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" class="form-control" id="username" value="{{ current_user.username }}" disabled>
                        <div class="form-text">Le nom d'utilisateur ne peut pas etre modifie.</div>
                    </div>

                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <input type="text" class="form-control" id="role" value="{{ current_user.role }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="created_at" class="form-label">Membre depuis</label>
                        <input type="text" class="form-control" id="created_at"
                               value="{{ current_user.created_at.strftime('%d/%m/%Y') }}" disabled>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('auth.change_password') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-key me-2"></i>Changer le mot de passe
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
