{# T31 - Macro breadcrumbs reutilisable #}
{% macro render_breadcrumbs(items) %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('user.dashboard') }}"><i class="bi bi-house"></i></a></li>
        {% for item in items %}
            {% if loop.last %}
                <li class="breadcrumb-item active" aria-current="page">{{ item.label }}</li>
            {% else %}
                <li class="breadcrumb-item"><a href="{{ item.url }}">{{ item.label }}</a></li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
{% endmacro %}
