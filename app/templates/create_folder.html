{% extends "base.html" %}

{% block title %}Creer un dossier - FamiliDocs{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('user.folders') }}">Dossiers</a></li>
        <li class="breadcrumb-item active">Nouveau dossier</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-folder-plus me-2"></i>Creer un nouveau dossier
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('user.create_folder') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nom du dossier <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               maxlength="100" placeholder="Ex: Assurance habitation">
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Categorie</label>
                        <select class="form-select" id="category" name="category">
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="parent_id" class="form-label">Dossier parent (optionnel)</label>
                        <select class="form-select" id="parent_id" name="parent_id">
                            <option value="">-- Aucun (dossier racine) --</option>
                            {% for folder in parent_folders %}
                            <option value="{{ folder.id }}">{{ folder.get_path() }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                                  placeholder="Description du dossier..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-folder-plus me-2"></i>Creer le dossier
                        </button>
                        <a href="{{ url_for('user.folders') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
